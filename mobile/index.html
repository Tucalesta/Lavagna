<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semplice lavagna mobile</title>
	<link rel="manifest" href="manifest.json">
<style>
    /* Impedisce scroll, zoom e selezioni accidentali */
    * { 
        touch-action: none; 
        -webkit-tap-highlight-color: transparent; 
        box-sizing: border-box; 
        -webkit-user-select: none;
        user-select: none;
    }
    
    body { 
        margin: 0; padding: 0; 
        display: flex; flex-direction: column; 
        /* Usa l'altezza dinamica per evitare che la barra finisca sotto i tasti di sistema */
        height: 100dvh; 
        width: 100vw;
        background-color: #222; 
        overflow: hidden;
        font-family: sans-serif;
    }

    .canvas-container { 
        flex: 1; /* Occupa tutto lo spazio superiore disponibile */
        width: 100%; 
        background: white; 
        position: relative;
        overflow: hidden;
    }

    canvas { display: block; background: white; }

    .toolbar { 
        width: 100%;
        background: #222; 
        color: white;
        padding: 10px 10px env(safe-area-inset-bottom); /* Protezione per iPhone/Android moderni */
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-top: 1px solid #444;
        z-index: 10;
    }

    .row { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        width: 100%; 
        gap: 8px;
    }

    .palette { display: flex; gap: 10px; flex-shrink: 0; }
    
    .swatch { 
        width: 32px; height: 32px; 
        border-radius: 50%; 
        border: 2px solid #fff; 
    }
    .swatch.active { border: 3px solid #ffcc00; transform: scale(1.1); }

    .slider-group { 
        display: flex; 
        align-items: center; 
        flex-grow: 1;
    }
    
    input[type="range"] { 
        width: 100%; 
        height: 20px; 
    }

    button { 
        flex: 1; /* Distribuisce i pulsanti equamente sulla riga */
        padding: 12px 5px; 
        border: none; 
        border-radius: 6px; 
        background: #444; 
        color: white; 
        font-size: 0.85em;
        font-weight: bold;
        text-align: center;
    }
    
    button.active { background: #ffcc00; color: #000; }
    .btn-save { background: #008000; }
    .btn-clear { background: #b22222; }
</style>
</head>
<body>

    <div class="canvas-container" id="container">
        <canvas id="board"></canvas>
    </div>

    <div class="toolbar">
        <div class="row">
            <div class="palette" id="palette">
                <div class="swatch active" style="background: #000000;" onclick="setCol('#000000', this)"></div>
                <div class="swatch" style="background: #ff0000;" onclick="setCol('#ff0000', this)"></div>
                <div class="swatch" style="background: #0000ff;" onclick="setCol('#0000ff', this)"></div>
                <div class="swatch" style="background: #008000;" onclick="setCol('#008000', this)"></div>
            </div>
            <div class="slider-group">
                <input type="range" id="brushSize" min="2" max="50" value="5">
            </div>
        </div>

        <div class="row">
            <button id="btnErase" onclick="toggleErase()">Gomma</button>
            <button id="btnText" onclick="toggleText()">Testo</button>
            <button onclick="undo()">Annulla</button>
            <button class="btn-clear" onclick="clearCanvas()">Svuota</button>
            <button class="btn-save" onclick="saveCanvas()">PNG</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('container');
        const brushSizeInput = document.getElementById('brushSize');
        
        let drawing = false, mode = 'draw'; // modes: draw, erase, text
        let lastX = 0, lastY = 0;
        let currentColor = '#000000';
        let undoStack = [];

        function resize() {
            const data = canvas.toDataURL();
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            const img = new Image();
            img.src = data;
            img.onload = () => ctx.drawImage(img, 0, 0);
        }

        window.addEventListener('resize', resize);
        resize();

        function saveState() {
            if (undoStack.length >= 15) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }
        saveState();

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - rect.left, y: t.clientY - rect.top };
        }

        function start(e) {
            const pos = getPos(e);
            if (mode === 'text') {
                const txt = prompt("Inserisci testo:");
                if (txt) {
                    ctx.fillStyle = currentColor;
                    ctx.font = `${brushSizeInput.value * 3}px Arial`;
                    ctx.fillText(txt, pos.x, pos.y);
                    saveState();
                }
                setMode('draw');
                return;
            }
            drawing = true;
            lastX = pos.x; lastY = pos.y;
            if (e.cancelable) e.preventDefault();
        }

        function move(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineWidth = brushSizeInput.value;
            
            if (mode === 'erase') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
            }

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x; lastY = pos.y;
            if (e.cancelable) e.preventDefault();
        }

        function stop() { 
            if(drawing) saveState(); 
            drawing = false; 
            ctx.globalCompositeOperation = 'source-over';
        }

        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', stop);

        // Fallback per PC se lo testi lì
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        function setCol(hex, el) {
            currentColor = hex;
            setMode('draw');
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btnErase').classList.toggle('active', mode === 'erase');
            document.getElementById('btnText').classList.toggle('active', mode === 'text');
        }

        function toggleErase() { setMode(mode === 'erase' ? 'draw' : 'erase'); }
        function toggleText() { setMode(mode === 'text' ? 'draw' : 'text'); }

        function undo() {
            if (undoStack.length > 1) {
                undoStack.pop();
                const img = new Image();
                img.src = undoStack[undoStack.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        }

        function clearCanvas() { if(confirm("Vuoi cancellare tutto?")) { ctx.clearRect(0, 0, canvas.width, canvas.height); saveState(); } }
        
        function saveCanvas() {
            const link = document.createElement('a');
            link.download = 'lavagna_mobile.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
